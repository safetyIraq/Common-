plugins {
    id 'com.android.application'
}

android {
    namespace 'com.v8.global.sniffer'
    compileSdk 34

    defaultConfig {
        applicationId "com.v8.global.sniffer"
        minSdk 24
        targetSdk 34
        versionCode 2 // 🔥 لازم يكون أعلى من اللوادر حتى يمسحه ويقعد مكانه
        versionName "2.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    // 🔥 هذي المكتبة هي اللي كانت ناقصة وسببت الخطأ
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
