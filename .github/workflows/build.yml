name: Build V8 Native Final
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # إعطاء صلاحية تشغيل محرك Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # عملية تجميع الكود وصناعة الـ APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # رفع الملف الناتج حتى تكدر تنزله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V8-Native-Final-App
          path: app/build/outputs/apk/debug/*.apk
