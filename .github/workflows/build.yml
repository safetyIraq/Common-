name: Build V8 Loader Final
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # إعداد محرك Gradle الجاهز بالسيرفر
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # تشغيل البناء مباشرة بدون الحاجة لملف gradlew المفقود
      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V8-Loader-Final-APK
          path: app/build/outputs/apk/debug/*.apk
