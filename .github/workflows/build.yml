name: Build V8 Sniffer
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet requests

      - name: Create Config & Requirements
        run: |
          echo '[app]' > flet.toml
          echo 'name = "V8 Sniffer"' >> flet.toml
          echo 'package_name = "com.v8.sniffer"' >> flet.toml
          echo 'requests' > requirements.txt
          echo 'flet' >> requirements.txt

      - name: Build APK
        run: |
          # تجاوز أخطاء اليونيكود القديمة
          cat << 'EOF' > sitecustomize.py
          import builtins
          def my_unicode(obj='', encoding='utf-8', errors='strict'):
              if encoding is None: encoding = 'utf-8'
              if errors is None: errors = 'strict'
              if isinstance(obj, bytes): return obj.decode(encoding, errors)
              return str(obj)
          builtins.unicode = my_unicode
          builtins.basestring = (str, bytes)
          EOF
          export PYTHONPATH=$PWD
          export FLET_CLI_NO_RICH_OUTPUT="true"
          yes | flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V8-Sniffer-Final
          path: build/apk/**/*.apk
