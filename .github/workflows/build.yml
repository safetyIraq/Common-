name: Build V8 Sniffer
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet requests

      - name: Create Config & Requirements
        run: |
          echo '[app]' > flet.toml
          echo 'name = "V8 Sniffer"' >> flet.toml
          echo 'package_name = "com.v8.sniffer"' >> flet.toml
          echo 'version = "1.0.0"' >> flet.toml
          echo 'build_number = "1"' >> flet.toml
          echo '' >> flet.toml
          echo '[android]' >> flet.toml
          echo 'min_sdk_version = 21' >> flet.toml
          echo 'target_sdk_version = 33' >> flet.toml
          echo '' >> flet.toml
          echo 'requests' > requirements.txt

      - name: Build APK
        run: |
          # تجاوز أخطاء اليونيكود القديمة
          cat << 'EOF' > sitecustomize.py
          import sys
          if sys.version_info[0] >= 3:
              import builtins
              builtins.unicode = str
              builtins.basestring = (str, bytes)
          EOF
          export PYTHONPATH=$PWD
          export FLET_CLI_NO_RICH_OUTPUT="true"
          flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V8-Sniffer-Final
          path: |
            build/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 90
